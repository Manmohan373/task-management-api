version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: postgres

    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Manmohan@373

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - task-network

  task-manager:

    build: .

    container_name: task-manager-container

    ports:
      - "8089:8088"

    depends_on:
      - postgres

    networks:
      - task-network

volumes:
  postgres-data:

networks:
  task-network: